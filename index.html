<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>Noor & Knot — Delhi's Luxury Bridal Beauty Marketplace</title>
<link rel="icon" href="hero-image.png">
<meta name="description" content="AI-powered bridal beauty marketplace for Delhi brides."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:auto}
body{background:#060104;color:#FFF9F6;font-family:'Cormorant Garamond',Georgia,serif;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#D4AF37}
.pf{font-family:'Playfair Display',serif}

/* PAGE TRANSITION PANELS */
#ov{position:fixed;inset:0;z-index:9999;display:grid;grid-template-columns:repeat(4,1fr);pointer-events:none}
.ovp{background:#060104;transform:scaleY(0);transform-origin:bottom;will-change:transform}

/* GSAP WORD SPLIT */
.word-wrap{display:inline-block;overflow:hidden;vertical-align:bottom;line-height:1.1}
.word-inner{display:inline-block;transform:translateY(110%)}

/* ANIMATIONS */
@keyframes floatUp{0%{transform:translateY(0) rotate(0);opacity:0}8%{opacity:.85}85%{opacity:.3}100%{transform:translateY(-110vh) rotate(400deg);opacity:0}}
@keyframes goldShimmer{0%{background-position:0%}100%{background-position:200%}}
@keyframes marqueeScroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes pulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}
@keyframes glowPulse{0%,100%{box-shadow:0 0 24px rgba(212,175,55,.15)}50%{box-shadow:0 0 52px rgba(212,175,55,.5)}}
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* GOLD TEXT */
.gold-text{background:linear-gradient(90deg,#9A7209,#D4AF37,#F0CC5A,#D4AF37,#9A7209);background-size:250% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:goldShimmer 5s linear infinite}

/* PARTICLES */
.pt{position:absolute;border-radius:50%;background:#D4AF37;pointer-events:none;animation:floatUp linear infinite}

/* BUTTONS */
.btn{border:none;cursor:pointer;font-family:'Cormorant Garamond',serif;font-weight:500;letter-spacing:1px;transition:all .3s cubic-bezier(.16,1,.3,1);display:inline-flex;align-items:center;gap:8px}
.btn:hover{transform:translateY(-2px)}
.btn-wine{background:#7B1E3D;color:#FFF9F6;box-shadow:0 6px 28px rgba(123,30,61,.4)}
.btn-wine:hover{background:#9B2E57;box-shadow:0 12px 40px rgba(123,30,61,.6)}
.btn-ghost{background:transparent;color:#D4AF37;border:1px solid rgba(212,175,55,.35)}
.btn-ghost:hover{border-color:rgba(212,175,55,.8);background:rgba(212,175,55,.06)}

/* GLASS */
.glass{background:rgba(18,4,10,.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(212,175,55,.15);border-radius:16px}

/* NAV */
.nk-nav{display:flex;justify-content:space-between;align-items:center;padding:22px 40px;position:fixed;top:0;left:0;right:0;z-index:500;transition:background .4s,border-color .4s;opacity:0}
.nk-nav.scrolled{background:rgba(6,1,4,.92);border-bottom:1px solid rgba(212,175,55,.09);backdrop-filter:blur(20px)}
.nav-logo{font-family:'Playfair Display',serif;font-size:20px;color:#D4AF37;cursor:pointer;letter-spacing:3px;user-select:none}
.nav-links{display:flex;gap:32px;align-items:center}
.nav-link{font-size:14px;color:rgba(255,249,246,.45);cursor:pointer;letter-spacing:.8px;transition:color .2s;border:none;background:transparent;font-family:'Cormorant Garamond',serif}
.nav-link:hover{color:#D4AF37}

/* CARDS */
.s-card{background:rgba(15,4,8,.95);border:1px solid rgba(212,175,55,.15);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .35s ease,box-shadow .35s ease;flex-shrink:0}
.s-card:hover{border-color:rgba(212,175,55,.55);box-shadow:0 20px 56px rgba(212,175,55,.1)}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 64px)}
#chat-msgs{flex:1;overflow-y:auto;padding:28px 24px;scroll-behavior:smooth}
#chat-msgs::-webkit-scrollbar{width:2px}
#chat-msgs::-webkit-scrollbar-thumb{background:rgba(212,175,55,.3)}
.msg-in{animation:msgIn .4s ease both}

/* DIVIDER */
.gold-line{height:1px;background:linear-gradient(to right,transparent,#D4AF37,transparent)}

/* INPUTS */
.nk-input{width:100%;padding:12px 0;border:none;border-bottom:1px solid rgba(212,175,55,.2);background:transparent;font-family:'Cormorant Garamond',serif;font-size:17px;color:#FFF9F6;outline:none;transition:border-color .25s}
.nk-input:focus{border-bottom-color:#D4AF37}
.nk-input option{background:#150308}

/* MARQUEE */
.marquee-inner{display:flex;white-space:nowrap;animation:marqueeScroll 22s linear infinite;font-size:13px;letter-spacing:3px;color:#E8C76A;
  text-shadow:0 0 6px rgba(232,199,106,0.15);font-family:'Cormorant Garamond',serif}
.marquee-inner:hover{animation-play-state:paused}

/* HORIZONTAL SCROLL */
#salon-carousel{overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none;padding:0 40px}
#salon-carousel::-webkit-scrollbar{display:none}

/* RESPONSIVE */
@media(max-width:768px){
  .nk-nav{padding:18px 20px}
  .desktop-only{display:none!important}
  #salon-carousel{padding:0 16px}
  .stats-row{grid-template-columns:1fr 1fr!important}
  .how-grid{grid-template-columns:1fr 1fr!important}
  .noor-grid{grid-template-columns:1fr!important}
  .test-grid{grid-template-columns:1fr!important}
  .salon-grid{grid-template-columns:1fr 1fr!important}
}
@media(max-width:480px){
  .how-grid{grid-template-columns:1fr!important}
  .salon-grid{grid-template-columns:1fr!important}
}
/* CUSTOM CURSOR */
@media(pointer:fine){
  *{cursor:none!important}

  #cursor-dot{
    width:6px;height:6px;
    background:#D4AF37;
    border-radius:50%;
    position:fixed;top:0;left:0;
    pointer-events:none;
    z-index:999999;
    transform:translate(-50%,-50%);
    transition:transform .15s ease,opacity .3s ease,background .3s ease;
    will-change:left,top;
  }

  #cursor-ring{
    width:38px;height:38px;
    border:1px solid rgba(212,175,55,.55);
    border-radius:50%;
    position:fixed;top:0;left:0;
    pointer-events:none;
    z-index:999998;
    transform:translate(-50%,-50%);
    transition:width .4s cubic-bezier(.16,1,.3,1),
               height .4s cubic-bezier(.16,1,.3,1),
               border-color .3s ease,
               background .3s ease,
               opacity .3s ease;
    will-change:left,top;
  }

  #cursor-ring.expanded{
    width:64px;height:64px;
    background:rgba(212,175,55,.07);
    border-color:rgba(212,175,55,.9);
  }

  #cursor-ring.clicking{
    width:28px;height:28px;
    background:rgba(212,175,55,.15);
  }
}
/* DOME TRANSITION */
#dome{
  position:fixed;
  left:50%;
  bottom:-220vw;

  width:220vw;
  height:220vw;

  border-radius:50%;

  background:
    radial-gradient(
      circle at center,
      #12040A 0%,
      #060104 70%
    );

  transform:translateX(-50%);

  z-index:99999;

  pointer-events:none;

  box-shadow:
      0 -20px 100px rgba(212,175,55,.15),
      0 -5px 40px rgba(212,175,55,.12);
}

/* VIDEO BACKGROUND */
#bg-video{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
    opacity:0.2;
}

.video-overlay{
    position:absolute;
    inset:0;
    background:rgba(6,1,4,0.35);
    z-index:1;
}
</style>
</head>
<body>
  <div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- PAGE TRANSITION OVERLAY -->
<div id="ov">
  <div class="ovp"></div><div class="ovp"></div>
  <div class="ovp"></div><div class="ovp"></div>
</div>

<div id="dome"></div>
<!-- APP -->
<div id="nk"></div>

<script>

gsap.registerPlugin(ScrollTrigger);
const G='#D4AF37',W='#7B1E3D',IV='#FFF9F6';


  /* ── DATA ── */
const SALONS=[
  {id:1,name:'Jean-Claude Biguine',area:'South Extension',spec:'French Luxury Bridal',price:'₹85,000–₹1,50,000',rating:4.8,rev:124,a:'#8B6914',b:'#4A0E20'},
  {id:2,name:'Lakmé Salon',area:'Hauz Khas',spec:'HD Airbrush Bridal',price:'₹45,000–₹80,000',rating:4.6,rev:89,a:'#3D1060',b:'#7B1E3D'},
  {id:3,name:'Studio 11',area:'Greater Kailash',spec:'Editorial Bridal',price:'₹90,000–₹1,80,000',rating:4.9,rev:203,a:'#7B1E3D',b:'#8B6914'},
  {id:4,name:'VLCC Wellness',area:'Saket',spec:'Complete Package',price:'₹35,000–₹65,000',rating:4.5,rev:156,a:'#6B2D00',b:'#7B1E3D'},

  {id:9,name:'BBlunt Salon',area:'Vasant Kunj',spec:'Modern Bridal Styling',price:'₹55,000–₹95,000',rating:4.7,rev:175,a:'#6B2D00',b:'#4A0E20'},
  {id:10,name:'Affinity Salon',area:'Defence Colony',spec:'Luxury Bridal Package',price:'₹80,000–₹1,40,000',rating:4.9,rev:240,a:'#7B1E3D',b:'#8B6914'},
  {id:11,name:'Toni & Guy',area:'Green Park',spec:'International Bridal Look',price:'₹65,000–₹1,25,000',rating:4.8,rev:198,a:'#0A3D2B',b:'#8B6914'},
  {id:12,name:'Jawed Habib',area:'Janakpuri',spec:'Classic Bridal Makeup',price:'₹35,000–₹70,000',rating:4.4,rev:165,a:'#4A0E20',b:'#7B1E3D'},
];


/* ── STATE ── */
let ST={page:'landing',msgs:[],typing:false,salon:SALONS[0],booked:false};

/* ── DEMO RESPONSES ── */

  {k:['budget','cheap','affordable','30k','40k','50k','20k','35k'],t:"For a breathtaking bridal look under ₹50k, VLCC in Saket and Naturals in Lajpat Nagar are my top picks — full packages, no compromise on artistry.",s:[4,5]},
  {k:['1 lakh','2 lakh','luxury','best','premium','top','finest','high end'],t:"For the absolute finest bridal experience in Delhi, these two studios are in a league of their own — Jean-Claude Biguine for Parisian luxury, Studio 11 for editorial perfection.",s:[1,3]},
  {k:['airbrush','hd','modern','dewy','glow','fresh','natural','minimal'],t:"For a luminous HD airbrush finish that photographs beautifully and holds from mandap to midnight — Lakmé Salon in Hauz Khas is my first recommendation.",s:[2]},

  {k:['celebrity','bold','glam','bollywood','editorial','dramatic'],t:"For that bold Bollywood-inspired bridal look, Enrich Salon in Punjabi Bagh is your answer. High-impact, glamorous, utterly stunning.",s:[6,3]},
  {k:['south indian','tamil','bengali','marathi','regional'],t:"For authentic regional bridal artistry, Naturals in Lajpat Nagar specialises in South Indian looks with beautiful results.",s:[5,1]},
  {k:['90 days','60 days','30 days','timeline','schedule','prepare','when','routine'],t:"Your countdown: 90 days — begin vitamin C + SPF daily. 60 days — hair spa and skin consultation. 30 days — full makeup trial with photographer. 7 days — relaxing facial only. Wedding morning — face massage, primer 30 mins before makeup.",s:[]},

];
function demoReply(txt){
  const t=txt.toLowerCase();
  for(const d of DEMO) if(d.k.some(k=>t.includes(k))) return{text:d.t,salons:d.s.map(id=>SALONS[id-1]).filter(Boolean)};
  return{text:"Tell me about your wedding — venue, date, budget, and the look you're dreaming of. I know every salon in Delhi personally.",salons:SALONS.slice(0,3)};
}

/* ── HELPERS ── */
function stars(n){return Array.from({length:5},(_,i)=>`<span style="color:${i<Math.floor(n)?G:'#2a1020'};font-size:12px">★</span>`).join('')}

function pts(n=18){
  return Array.from({length:n},()=>{
    const sz=Math.random()*4+1.5;
    return`<div class="pt" style="width:${sz}px;height:${sz}px;left:${Math.random()*100}%;bottom:0;opacity:${.3+Math.random()*.6};animation-duration:${10+Math.random()*14}s;animation-delay:${Math.random()*12}s"></div>`;
  }).join('');
}

function mandala(){
  const lines=Array.from({length:16},(_,i)=>{const a=i*(Math.PI/8);return`<line x1="${250+130*Math.cos(a)}" y1="${250+130*Math.sin(a)}" x2="${250+230*Math.cos(a)}" y2="${250+230*Math.sin(a)}" stroke="${G}" stroke-width=".3"/>`}).join('');
  const dots=Array.from({length:8},(_,i)=>{const a=i*(Math.PI/4);return`<circle cx="${250+180*Math.cos(a)}" cy="${250+180*Math.sin(a)}" r="4" stroke="${G}" stroke-width=".6" fill="none"/>`}).join('');
  return`<svg id="hero-mandala" viewBox="0 0 500 500" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:min(85%,640px);opacity:.055;pointer-events:none" fill="none"><circle cx="250" cy="250" r="228" stroke="${G}" stroke-width=".6"/><circle cx="250" cy="250" r="178" stroke="${G}" stroke-width=".4"/><circle cx="250" cy="250" r="128" stroke="${G}" stroke-width=".4"/><circle cx="250" cy="250" r="18" stroke="${G}" stroke-width=".8"/>${lines}${dots}</svg>`;
}

  return`<div class="s-card" style="width:${w};min-width:${w}" onclick="goSalon(${s.id})">

        <div>${stars(s.rating)}<span style="font-size:11px;color:rgba(255,249,246,.3);margin-left:6px">${s.rating}</span></div>

    </div>
  </div>`;
}

function miniCard(s){

function topNav(){
  return`<nav class="nk-nav" id="main-nav">
    <div class="nav-logo" onclick="go('landing')">Noor <span style="color:rgba(212,175,55,.25)">|</span> Knot</div>

/* Split text into word spans for reveal animation */
function splitWords(el){
  if(!el||el.dataset.split)return;
  el.dataset.split='1';
  // Handle nested elements (italic spans etc)
  function processNode(node){
    if(node.nodeType===3){// text node
      const words=node.textContent.split(/(\s+)/);
      const frag=document.createDocumentFragment();
      words.forEach(w=>{
        if(/^\s+$/.test(w)||w===''){
          frag.appendChild(document.createTextNode(w));
        } else {
          const outer=document.createElement('span');
          outer.className='word-wrap';
          const inner=document.createElement('span');
          inner.className='word-inner';
          inner.textContent=w;
          outer.appendChild(inner);
          frag.appendChild(outer);
        }
      });
      node.parentNode.replaceChild(frag,node);
    } else if(node.nodeType===1&&node.tagName!=='BR'){
      Array.from(node.childNodes).forEach(processNode);
    }
  }
  Array.from(el.childNodes).forEach(processNode);
}

function animateWords(el,delay=0){
  const words=el.querySelectorAll('.word-inner');
  if(!words.length)return;
  gsap.to(words,{
    y:'0%',opacity:1,duration:.8,stagger:.06,
    ease:'power3.out',delay
  });
}

async function sendMsg(){
  const inp = document.getElementById('chat-in');
  if(!inp) return;
  const txt = inp.value.trim();
  if(!txt) return;

  inp.value = '';
  ST.msgs.push({ type:'user', text:txt });
  ST.typing = true;
  render();
  scrollChat();

  try {
    const res = await fetch('https://noor-knot-production.up.railway.app/noor', {
      method  : 'POST',
      headers : { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        message: txt,
        history: ST.msgs.filter(m => m.type !== 'typing').map(m => ({
          role: m.type === 'user' ? 'user' : 'model',
          text: m.text
        }))
      })
    });
    const data = await res.json();

    if(data.action === 'show_booking_card'){
      const matchedSalon = SALONS.find(s =>
        s.name.toLowerCase().includes(data.studio.toLowerCase()) ||
        data.studio.toLowerCase().includes(s.name.toLowerCase())
      );
      ST.msgs.push({ type:'noor', text:data.text, salons:matchedSalon?[matchedSalon]:[], showBookingCard:true });

    } else if(data.action === 'confirm_booking'){
      ST.msgs.push({ type:'noor', text:data.text, salons:[], bookingConfirmed:{ studio:data.studio, trialDate:data.trialDate, weddingDate:data.weddingDate } });

    } else {
      const mentionedSalons = SALONS.filter(s => data.text && data.text.toLowerCase().includes(s.name.toLowerCase()));
      ST.msgs.push({ type:'noor', text:data.text||'', salons:mentionedSalons });
    }

  } catch(err) {
    const reply = demoReply(txt);
    ST.msgs.push({ type:'noor', text:reply.text, salons:reply.salons });
  }
   ST.typing = false;
  render();
  scrollChat();
}

/* ══════════════════════════════════════
   CUSTOM CURSOR
══════════════════════════════════════ */
(function(){
  // Only run on devices with a real cursor (not touch)
  if(!window.matchMedia('(pointer:fine)').matches) return;

  const dot  = document.getElementById('cursor-dot');
  const ring = document.getElementById('cursor-ring');
  if(!dot || !ring) return;

  let mX=window.innerWidth/2, mY=window.innerHeight/2;
  let rX=mX, rY=mY;
  let visible=false;

  // Track mouse position
  document.addEventListener('mousemove', e=>{
    mX=e.clientX; mY=e.clientY;
    if(!visible){
      visible=true;
      dot.style.opacity='1';
      ring.style.opacity='1';
      // Snap ring to position on first appearance
      rX=mX; rY=mY;
    }
    // Dot follows cursor instantly
    dot.style.left = mX+'px';
    dot.style.top  = mY+'px';
  });

  // Ring follows with smooth lag (lerp)
  function lerp(a,b,t){ return a+(b-a)*t; }

  function animateRing(){
    rX = lerp(rX, mX, 0.1);
    rY = lerp(rY, mY, 0.1);
    ring.style.left = rX+'px';
    ring.style.top  = rY+'px';
    requestAnimationFrame(animateRing);
  }
  animateRing();

  // Hide when mouse leaves window
  document.addEventListener('mouseleave',()=>{
    dot.style.opacity='0';
    ring.style.opacity='0';
    visible=false;
  });
  document.addEventListener('mouseenter',()=>{
    dot.style.opacity='1';
    ring.style.opacity='1';
    visible=true;
  });

  // Expand ring on hover over interactive elements
  const HOVER_TARGETS='button,a,.btn,.s-card,.nav-link,.nav-logo,.nk-input,select';

  document.addEventListener('mouseover', e=>{
    if(e.target.closest(HOVER_TARGETS)){
      ring.classList.add('expanded');
      dot.style.transform='translate(-50%,-50%) scale(0)';
    }
  });
  document.addEventListener('mouseout', e=>{
    if(e.target.closest(HOVER_TARGETS)){
      ring.classList.remove('expanded');
      dot.style.transform='translate(-50%,-50%) scale(1)';
    }
  });

  // Shrink on click
  document.addEventListener('mousedown',()=>{
    ring.classList.add('clicking');
    dot.style.background='#fff';
  });
  document.addEventListener('mouseup',()=>{
    ring.classList.remove('clicking');
    dot.style.background='#D4AF37';
  });
})();
/* ══════════════════════════════════════
   CURSOR TRAIL — Canvas based
══════════════════════════════════════ */
(function(){
  if(!window.matchMedia('(pointer:fine)').matches) return;

  // Create full-screen canvas overlay
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:999996;';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');

  function resize(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const TRAIL_LIFE = 420; // ms trail stays visible
  let pts = [];           // [x, y, timestamp]

  document.addEventListener('mousemove', e => {
    pts.push([e.clientX, e.clientY, Date.now()]);
  });

  function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const now = Date.now();

    // Kill points older than TRAIL_LIFE
    pts = pts.filter(p => now - p[2] < TRAIL_LIFE);

    if(pts.length < 2){ requestAnimationFrame(draw); return; }

    // Draw each segment — newer = brighter + thicker
    for(let i = 1; i < pts.length; i++){
      const age  = now - pts[i][2];           // 0 = just drawn
      const life = 1 - (age / TRAIL_LIFE);    // 1 = fresh, 0 = dead

      ctx.beginPath();
      ctx.moveTo(pts[i-1][0], pts[i-1][1]);
      ctx.lineTo(pts[i][0],   pts[i][1]);
      ctx.strokeStyle = `rgba(212,175,55,${(life * life * 0.55).toFixed(3)})`;
      ctx.lineWidth   = life * 2.2;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.stroke();
    }

    requestAnimationFrame(draw);
  }
  draw();
})();
/* ══════════════════════════════════════
   DOME SCROLL TRANSITION
   220vw wide circle rises from below —
   only its curved top arc is visible
   = the dome/arch shape from Obsidian
══════════════════════════════════════ */
(function(){
  const dome = document.getElementById('dome');
  if(!dome) return;

  let st = null;

  function initDome(){
    if(st){ st.kill(); st=null; }

    const hero = document.getElementById('hero');
    if(!hero){
      dome.style.opacity = '0';
      return;
    }

    // Reset
    dome.style.opacity   = '1';
    dome.style.transform = 'translateX(-50%) translateY(100%)';

    st = ScrollTrigger.create({
      trigger : hero,
      start   : 'top top',
      end     : 'bottom top',
      scrub   : 2.5,
      onUpdate: self => {
        // 100% = fully below screen (hidden)
        // -15% = fully covering screen
        const y = 100 - (self.progress * 118);
        dome.style.transform =
          `translateX(-50%) translateY(${y.toFixed(3)}%)`;
      },
      onLeave: () => {
        // Hero scrolled past — fade dome out
        // so next sections are cleanly visible
        dome.style.opacity   = '0';
        dome.style.transform = 'translateX(-50%) translateY(-50%)';
      },
      onEnterBack: () => {
        // Scrolling back into hero — show dome again
        dome.style.opacity = '1';
      },
      onLeaveBack: () => {
        // Back at very top — reset dome to hidden
        dome.style.transform = 'translateX(-50%) translateY(100%)';
      }
    });
  }

  // Hook into your render function
  const _orig = window.render;
  window.render = function(){
    _orig();
    requestAnimationFrame(()=>{
      if(ST && ST.page === 'landing'){
        setTimeout(initDome, 150);
      } else {
        if(st){ st.kill(); st=null; }
        dome.style.opacity   = '0';
        dome.style.transform = 'translateX(-50%) translateY(100%)';
      }
    });
  };

  // Init on first load
  requestAnimationFrame(()=>{
    if(ST && ST.page === 'landing') initDome();
    else dome.style.opacity = '0';
  });
})();
